# 新闻筛选规则配置

# 保留关键词（命中任一即保留）
include_keywords:
  - 商业航天
  - 卫星互联网
  - 低轨卫星
  - 运载火箭
  - 增材制造
  - 3D打印
  - 铂力特
  - 航天动力
  - 航天电子
  - 中国卫星

# 排除关键词
exclude_keywords:
  - 消费级
  - 家用
  - 概念下跌
  - 龙虎榜

# 投资主题定义
investment_themes:
  - name: 商业航天
    description: 火箭发射、卫星制造、卫星互联网、低轨卫星星座
    stocks:
      - 航天动力
      - 航天电子
      - 中国卫星
  - name: 增材制造
    description: 3D打印、金属增材制造、工业级打印设备
    stocks:
      - 铂力特

# 筛选标准
filter_criteria: |
  保留有投资价值的新闻，排除：
  1. 纯概念炒作、无实质内容
  2. 澄清公告（除非有重要信息）
  3. 重复报道
  4. 与投资主题无关的内容

# 股票池（用于识别关联股票）
stock_pool:
  - code: "600343"
    name: 航天动力
    aliases:
      - 航天动力
      - 航天动力股份
  - code: "688333"
    name: 铂力特
    aliases:
      - 铂力特
      - 铂力特股份
  - code: "600879"
    name: 航天电子
    aliases:
      - 航天电子
      - 航天电子股份
  - code: "600118"
    name: 中国卫星
    aliases:
      - 中国卫星
      - 中国卫星股份

# 事件类型定义
event_types:
  政策: 政策支持、法规变化、产业规划
  公告: 公司公告、业绩预告、重大事项
  技术: 技术突破、研发进展、专利
  订单: 中标、签约、订单获取
  澄清: 澄清公告、风险提示
  事件: 行业事件、会议、展览

# AI 筛选配置
ai_filter:
  enabled: true
  batch_size: 30
  max_retries: 3
  retry_delay: 1.0