# ============================================================
# 商业航天板块股票池配置
# 版本：v2.3 | 最后更新：2026-03-17
#
# 说明：
#   本文件同时作为"配置文件"和"数据资产"使用。
#   每次调整股票池时，必须更新 version 和 changelog。
#   股票池变化会影响 sector_avg_return 和排名计算，
