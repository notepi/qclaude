# ============================================================

version: "2026-03-18"
changelog:
  - date: "2026-03-18"
    change: "股票池治理规则固化（v2026-03-18）：更新斯瑞新材(688102)/上海瀚讯(300762)配置；补充 reason 和 review_date；新增 docs/pool_governance.md 治理文档"
  - date: "2026-03-17"
    change: "research_core 正式建立（v2026-03-17e）：688433.SH 华曙高科、003009.SZ 中天火箭升入 research_core"
  - date: "2026-03-17"
    change: "research_core 候选验证：华曙高科/中天火箭纳入研究层，601698 中国卫通暂缓升入 core"
  - date: "2026-03-17"
    change: "扩充股票池宇宙（v2026-03-17d）：新增 research_candidates / trading_candidates"
  - date: "2026-03-17"
    change: "benchmark 最小修正确认（v2026-03-17c）：保持 core_universe 3只"
  - date: "2026-03-17"
    change: "股票池专项评审（v2026-03-17b）：移出航天工程，升入中国卫星"
  - date: "2026-03-17"
    change: "P2 资产化升级：新增 version/changelog/layer/reason/benchmark_included 字段"
  - date: "2026-03-10"
    change: "重构为双层结构（core/extended），core 3只，extended 7只，anchor 独立"
  - date: "2026-03-01"
    change: "初始版本，11只商业航天相关股票"

# ============================================================
# 锚定标的
# 注意：anchor 不参与板块均值计算，不参与排名分母
# ============================================================
anchor:
  code: 688333.SH
  name: 铂力特
  layer: anchor
  active: true
  reason: "主要研究标的，国内金属增材制造（3D打印）龙头，科创板上市"
  benchmark_included: false   # 不参与板块均值和排名分母计算

# ============================================================
# 核心股票池（用于板块均值和排名计算）
# benchmark_included: true 表示参与板块均值计算
# ============================================================
core_universe:
  - code: 600343.SH
    name: 航天动力
    layer: core
    active: true
    tags: [propulsion, state-owned]
    reason: "航天发动机核心标的，商业航天推进系统代表性公司；火箭发动机是铂力特增材制造的直接下游应用场景"
    benchmark_included: true
    added_date: "2026-03-10"

  - code: 600879.SH
    name: 航天电子
    layer: core
    active: true
    tags: [electronics, state-owned]
    reason: "航天电子核心标的，航天供应链上游，与铂力特同属航天制造体系；情绪联动有效（近20日相关系数 +0.679）"
    benchmark_included: true
    added_date: "2026-03-10"

  - code: 600118.SH
    name: 中国卫星
    layer: core
    active: true
    tags: [satellite, state-owned, commercial-space]
    reason: "卫星赛道代表，同受商业航天政策催化；卫星结构件是铂力特增材制造的重要应用场景（近20日相关系数 +0.646）；2026-03-17 从 extended 升入 core"
    benchmark_included: true
    added_date: "2026-03-17"

# ============================================================
# 扩展股票池（观察期，暂不参与均值计算）
# benchmark_included: false 表示不参与板块均值计算
# review_date: 下次评估是否升入 core 的建议日期
# ============================================================
# ============================================================
# 研究核心池（research_core）
# 与铂力特业务逻辑直接相关的研究层对标，不参与 benchmark 计算
# 用途：研究层分析、产业链对比、估值参照、需求端验证
# benchmark_included: false（当前不接入计算层）
# ============================================================
research_core:
  - code: 600343.SH
    name: 航天动力
    layer: research_core
    active: true
    tags: [propulsion, state-owned, dual-role]
    reason: "航天发动机核心标的；同时在 trading core（双重身份）；火箭发动机是铂力特增材制造的直接下游应用场景，是需求端最重要的研究参照"
    benchmark_included: false
    research_role: "需求端参照：发动机产能扩张 → 铂力特零件订单增长"
    added_date: "2026-03-17"

  - code: 688433.SH
    name: 华曙高科
    layer: research_core
    active: true
    tags: [additive-manufacturing, sci-tech, direct-comparable]
    reason: "国内工业级金属/高分子 3D 打印设备龙头，与铂力特同属增材制造赛道；铂力特做零件制造服务，华曙高科做设备，产业链互补；近20日相关系数 +0.792（最高），近期走势分化（+6% vs -14%）本身是重要研究信号"
    benchmark_included: false
    research_role: "同赛道估值对标：增材制造渗透率先行指标，设备销量反映行业景气度"
    added_date: "2026-03-17"
    data_status: "已 fetch，37 条（20260116~20260317）"

  - code: 003009.SZ
    name: 中天火箭
    layer: research_core
    active: true
    tags: [rocket, commercial-space, propulsion, downstream]
    reason: "固体火箭发动机及商业航天整体解决方案；铂力特增材制造零件的直接下游客户类型；发射节奏/订单披露是铂力特需求端的先行指标；近20日相关系数 +0.374（联动弱，但研究价值高）"
    benchmark_included: false
    research_role: "需求端验证：发射计划密集 → 铂力特火箭结构件/发动机零件需求旺盛"
    added_date: "2026-03-17"
    data_status: "已 fetch，37 条（20260116~20260317）"

