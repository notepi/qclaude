# 新闻催化筛选规则

# 保留关键词（命中任一即保留）- 用于粗筛
include_keywords:
  - 商业航天
  - 卫星互联网
  - 低轨卫星
  - 运载火箭
  - 增材制造
  - 3D打印
  - 铂力特
  - 航天动力
  - 航天电子
  - 中国卫星

# 排除关键词
exclude_keywords:
  - 消费级
  - 家用
  - 概念下跌
  - 龙虎榜

# 投资主题描述（供大模型理解）
investment_themes:
  - name: "商业航天"
    description: "包括火箭发射、卫星制造、卫星互联网、航天产业链相关公司，关注发射任务、星座建设、政策支持等"
    stocks: ["航天动力", "中国卫星", "航天电子"]

  - name: "增材制造"
    description: "3D打印技术及产业链，包括金属粉末、设备制造、航空航天应用"
    stocks: ["铂力特"]

# 筛选标准（供大模型判断）
filter_criteria: |
  保留对投资决策有价值的新闻：
  1. 政策利好、重大订单、技术突破
  2. 相关公司公告、业绩预告、重大事项
  3. 行业重大事件、产业链动态
  4. 核心技术进展、商业发射计划

  排除：
  1. 纯概念炒作、无实质内容
  2. 负面澄清（如"公司不涉及商业航天"）
  3. 龙虎榜、资金流向等短期数据
  4. 与投资主题无直接关联的内容

# AI 筛选配置
ai_filter:
  enabled: true
  batch_size: 5  # 每批处理的新闻数量
  max_retries: 3  # API 调用最大重试次数
  retry_delay: 1.0  # 重试间隔（秒）